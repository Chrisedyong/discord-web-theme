<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Discord Theme</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 12px;
      width: 280px;
      background: #111827;
      color: white;
    }

    h3 {
      margin: 0 0 12px 0;
      font-size: 16px;
    }

    .row {
      margin-bottom: 12px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    label {
      display: block;
      margin-bottom: 4px;
      font-size: 13px;
    }

    select,
    input[type="number"],
    input[type="color"] {
      width: 100%;
      box-sizing: border-box;
      padding: 6px;
      border-radius: 8px;
      border: none;
      background: #1f2937;
      color: white;
    }

    input[type="checkbox"] {
      transform: scale(1.15);
    }

    input[type="range"] {
      width: 100%;
    }

    .range-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .range-wrap span {
      min-width: 44px;
      text-align: right;
      font-size: 12px;
      opacity: 0.9;
    }

    #customSection {
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.12);
      margin-top: 10px;
    }

    .button-row {
      display: flex;
      gap: 8px;
    }

    button {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-weight: 600;
    }

    button.secondary {
      background: #374151;
    }
  </style>
</head>
<body>
  <h3>Discord Theme</h3>

  <div class="row toggle-row">
    <label for="themeEnabled" style="margin-bottom:0;">Enable Theme</label>
    <input type="checkbox" id="themeEnabled" />
  </div>

  <div class="row">
    <label for="themeName">Theme</label>
    <select id="themeName">
      <option value="blue">Blue</option>
      <option value="purple">Purple</option>
      <option value="emerald">Emerald</option>
      <option value="sunset">Sunset</option>
      <option value="rose">Rose</option>
      <option value="gold">Gold</option>
      <option value="ocean">Ocean</option>
      <option value="midnight">Midnight</option>
      <option value="custom">Custom</option>
    </select>
  </div>

  <div id="customSection">
    <div class="row">
      <label for="gradientAngle">Gradient Angle</label>
      <input id="gradientAngle" type="number" min="0" max="360" value="175" />
    </div>

    <div class="row">
      <label for="color1">Color 1</label>
      <input id="color1" type="color" value="#1b2f5b" />
    </div>

    <div class="row">
      <label for="color1Opacity">Color 1 Opacity</label>
      <div class="range-wrap">
        <input id="color1Opacity" type="range" min="0" max="100" value="100" />
        <span id="color1OpacityValue">100%</span>
      </div>
    </div>

    <div class="row">
      <label for="color2">Color 2</label>
      <input id="color2" type="color" value="#244a86" />
    </div>

    <div class="row">
      <label for="color2Opacity">Color 2 Opacity</label>
      <div class="range-wrap">
        <input id="color2Opacity" type="range" min="0" max="100" value="100" />
        <span id="color2OpacityValue">100%</span>
      </div>
    </div>

    <div class="row">
      <label for="color3">Color 3</label>
      <input id="color3" type="color" value="#356b94" />
    </div>

    <div class="row">
      <label for="color3Opacity">Color 3 Opacity</label>
      <div class="range-wrap">
        <input id="color3Opacity" type="range" min="0" max="100" value="100" />
        <span id="color3OpacityValue">100%</span>
      </div>
    </div>

    <div class="row button-row">
      <button id="randomizeButton" class="secondary" type="button">Randomize</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
